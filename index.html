<!doctype html>
<html>
  <head>
    <title>Kanban App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Kanban Board</h1>

    <div id="board">
      <div class="column" id="todo">
        <h2>Todo</h2>
        <button class="add-task">Add Task</button>
        <div class="tasks"></div>
      </div>

      <div class="column" id="doing">
        <h2>Doing</h2>
        <button class="add-task">Add Task</button>
        <div class="tasks"></div>
      </div>

      <div class="column" id="done">
        <h2>Done</h2>
        <button class="add-task">Add Task</button>
        <div class="tasks"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
